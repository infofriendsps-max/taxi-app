name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pyqt6 pyinstaller
    - run: pyinstaller --onefile --windowed --name=TaxiManager main.py
    - uses: actions/upload-artifact@v4
      with:
        name: TaxiManager
        path: dist/TaxiManager.exe
